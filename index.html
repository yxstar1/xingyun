<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幸运专属私人食谱库</title>
    <style>
        :root { --gold: #FFD700; --red: #FF4500; }
        /* 极致性能优化：禁止系统默认高亮 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            margin: 0; padding: 0; 
            background: url('bg1.jpg') no-repeat center 20% fixed;
            background-size: cover;
            font-family: 'PingFang SC', sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* 1. 标题位置优化：绝对不被箭头挡住 */
        h1 { 
            margin: 0;
            padding-top: 35px; /* 增加顶部间距 */
            padding-bottom: 10px;
            font-size: 1.3rem; 
            color: var(--gold);
            text-shadow: 1px 1px 2px #000;
            z-index: 10;
            width: 100%;
            text-align: center;
        }

        /* 2. 转盘半透明化 */
        .wheel-container {
            position: relative; width: 320px; height: 320px;
            border: 3px solid rgba(255, 215, 0, 0.5); border-radius: 50%;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1); 
        }
        #wheel { width: 100%; height: 100%; border-radius: 50%; transition: transform 4s cubic-bezier(0.15, 0, 0.2, 1); }
        
        /* 箭头指针 */
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 28px solid var(--red); z-index: 20; }
        
        /* 中心按钮 */
        .center-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 44px; height: 44px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; border: 2px solid #fff; z-index: 21; font-size: 12px; }

        /* 按钮组 */
        .controls { display: flex; flex-direction: column; align-items: center; margin-top: 20px; gap: 10px; z-index: 30; }
        .spin-btn { padding: 12px 60px; background: linear-gradient(to right, var(--gold), #ffb800); color: #000; border: none; border-radius: 25px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .history-btn { display: none; padding: 8px 40px; background: rgba(255,255,255,0.9); color: #856404; border: 1px solid var(--gold); border-radius: 20px; font-size: 0.85rem; font-weight: bold; }

        /* 食谱详情卡片 */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 99; }
        .recipe-card {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 400px; background: #fff; color: #333;
            padding: 15px; border-radius: 12px; z-index: 100; max-height: 80vh; overflow-y: auto;
        }
        .recipe-card h2 { color: #856404; border-bottom: 2px solid var(--gold); padding-bottom: 5px; margin: 0 0 10px 0; font-size: 1.2rem; text-align: center; }
        .recipe-section { margin-bottom: 10px; background: #fff9eb; padding: 8px; border-radius: 6px; border-left: 3px solid var(--gold); }
        .section-label { font-weight: bold; color: #d32f2f; font-size: 0.85rem; display: block; margin-bottom: 3px; }
        .recipe-text { font-size: 0.85rem; line-height: 1.5; color: #444; white-space: pre-line; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .swap-btn { background: #f2f2f2; color: #666; border: none; flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 0.85rem; }
        .confirm-btn { background: var(--gold); color: #000; border: none; flex: 1.5; padding: 12px; border-radius: 8px; font-weight: bold; }

        /* 文案下移 */
        .footer { margin-top: auto; padding: 20px 0; font-size: 0.7rem; color: #fff; font-weight: bold; text-align: center; width: 100%; text-shadow: 1px 1px 2px #000; }
        
        .star { position: fixed; top: -5vh; pointer-events: none; color: var(--gold); z-index: 200; animation: slowFall linear forwards; }
        @keyframes slowFall { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(105vh) rotate(360deg); opacity: 0; } }
        .kid-tag { color: #28a745; font-weight: bold; font-size: 0.7rem; border: 1px solid #28a745; padding: 0 3px; border-radius: 3px; margin-left: 3px; }
    </style>
</head>
<body>

<div id="star-container"></div>
<div class="overlay" id="overlay"></div>

<div class="recipe-card" id="recipeCard">
    <h2 id="rTitle">菜名</h2>
    <div class="recipe-section"><span class="section-label">🛒 食材清单</span><div class="recipe-text" id="rIng"></div></div>
    <div class="recipe-section"><span class="section-label">🧂 调料精确配比</span><div class="recipe-text" id="rSauce"></div></div>
    <div class="recipe-section"><span class="section-label">🔪 备菜计时</span><div class="recipe-text" id="rPrep"></div></div>
    <div class="recipe-section"><span class="section-label">🔥 烹饪步骤/计时</span><div class="recipe-text" id="rStep"></div></div>
    <div class="btn-group">
        <button class="swap-btn" id="swapBtn" onclick="swapRecipe()">不想做，换一个</button>
        <button class="confirm-btn" onclick="confirmRecipe()">宝贝收到</button>
    </div>
</div>

<h1>幸运专属私人食谱库</h1>
<div class="wheel-container"><div class="pointer"></div><div class="center-btn">LH7</div><canvas id="wheel" width="800" height="800"></canvas></div>
<div class="controls">
    <button class="spin-btn" id="mainSpinBtn" onclick="startSpin()">点击选择</button>
    <button class="history-btn" id="historyBtn" onclick="reviewLast()">回顾上次</button>
</div>
<div class="footer">Made for You by 你的专属制作员</div>

<script>
    const canvas = document.getElementById('wheel'), ctx = canvas.getContext('2d');
    let isSpinning = false, lastWinnerIdx = -1, currentDeg = 0;

    const recipesRaw = [
        { name: "虾仁滑蛋", isKid: true, ing: "虾仁150g,鸡蛋3个,葱1根", sauce: "盐2.5g,胡椒0.5g,生粉5g+水15ml", prep: "虾仁腌10min,蛋液加生粉水打匀", step: "1.大火炒虾45s盛出\n2.倒蛋液中火静置10s\n3.半凝固入虾推铲25s关火" },
        { name: "可乐鸡翅", isKid: false, ing: "翅中8只,可乐330ml,姜5片", sauce: "生抽30ml,老抽5ml,盐1.5g", prep: "切2刀焯水2min洗净控干", step: "1.中火每面煎4min至金黄\n2.入料焖12.5min\n3.大火猛收3min挂浆" },
        { name: "酸辣土豆丝", isKid: false, ing: "土豆300g,青椒半个,干椒3个", sauce: "白醋30ml,陈醋15ml,盐3.5g", prep: "切丝洗3次浸10min控干", step: "1.爆香炒丝95s变透\n2.加盐椒淋醋汁\n3.大火翻30s出锅" },
        { name: "农家小炒肉", isKid: false, ing: "前腿肉250g,螺丝椒4个,豆豉20粒", sauce: "生抽30ml,大蒜5瓣", prep: "椒煸5min虎皮,瘦肉腌5min", step: "1.煸猪油瘦肉变色入蒜椒\n2.淋酱油最大火炒45s" },
        { name: "红烧排骨", isKid: false, ing: "肋排500g,糖10颗,八角2,姜5", sauce: "生抽30ml,老抽7ml,料酒15ml", prep: "焯3min洗净,熬糖色3.5min", step: "1.排骨挂色入料小火焖45min\n2.大火收汁5.5min至红亮" },
        { name: "肉末蒸蛋", isKid: true, ing: "鸡蛋2个,猪肉末65g,温水200ml", sauce: "生抽1.5勺,香油15ml,盐1.5g", prep: "蛋水1:1.5过筛,肉腌5min", step: "1.中火蒸10.5min\n2.炒肉末3.5min铺面\n3.淋油闷1.5min上桌" },
        { name: "小炒黄牛肉", isKid: false, ing: "嫩牛200g,尖椒5个,芹菜50g", sauce: "蚝油20ml,生粉3g,油15ml", prep: "逆纹切薄片油腌20.5min", step: "1.最高温猛划35s出锅\n2.炒辣入牛合炒20.5s" },
        { name: "番茄牛腩", isKid: true, ing: "牛腩500g,番茄3,土豆1", sauce: "冰糖5粒,盐5.5g,番茄酱30ml", prep: "腩焯水3.5cm块,土豆2.5cm块", step: "1.焖炖65min\n2.入薯番茄炖20.5min" },
        { name: "清蒸鲈鱼", isKid: true, ing: "鲈鱼550g,葱丝30g,老姜30g", sauce: "豉油50ml,植物油35ml", prep: "划口腌6min,葱丝泡卷", step: "1.大火蒸8.5min闷1.5min\n2.换葱泼200度油激香" },
        { name: "糖醋里脊", isKid: false, ing: "里脊250g,蛋清1,芝麻5g", sauce: "茄酱60ml,醋15ml,糖30g", prep: "1cm条腌15min炸5.5min", step: "1.酱汁起大泡入肉裹浆10s\n2.撒芝麻立刻装盘" },
        { name: "滑蛋牛柳", isKid: true, ing: "牛肉100g,蛋3个", sauce: "盐2g,生粉,油", prep: "牛浆腌20min,蛋加盐打散", step: "1.滑牛30s盛出\n2.倒蛋微凝入牛推30s关火" },
        { name: "手撕包菜", isKid: false, ing: "包菜300g,五花肉60g", sauce: "陈醋3勺,生抽,盐3.5g", prep: "手撕片,肉切极薄", step: "1.煸肉爆椒最大火炒2.5min\n2.淋醋合味快炒30s" },
        { name: "麻婆豆腐", isKid: false, ing: "豆腐400g,肉末60g,豆瓣1勺", sauce: "椒粉3g,盐2g,生粉5g", prep: "方块盐水泡5min", step: "1.炒酱入水300ml焖6.5min\n2.三次勾芡撒厚椒粉" },
        { name: "五彩玉米粒", isKid: true, ing: "玉米150,丁50,豆50", sauce: "盐2.5g,糖4g", prep: "丁焯沸水3.5min彻底断生", step: "1.热油炒2.5min调味勾芡\n2.猛炒30s晶莹透亮" },
        { name: "萝卜丝汤", isKid: true, ing: "萝卜250g,蛋1,枸杞", sauce: "盐2g,白胡椒0.5g", prep: "切细丝,煎1个老荷包蛋", step: "1.炒丝3min入500ml热水蛋\n2.大火煮6.5min汤奶白" },
        { name: "腊肉萝卜干", isKid: false, ing: "腊肉100g,萝卜干80g", sauce: "小米辣,豆豉,生抽", prep: "萝卜干泡挤干,腊肉煮15min", step: "1.煸腊肉爆椒入萝卜干\n2.大火猛炒4.5min" },
        { name: "湘味炒豆腐", isKid: false, ing: "豆腐1,肉末50,蒜苗", sauce: "生抽2,蚝油,开水", prep: "豆腐煎金黄8.5min", step: "1.炒末入豆腐焖4.5min\n2.入蒜苗炒匀30s" },
        { name: "宫保鸡丁", isKid: false, ing: "鸡丁200,花生30,辣椒葱", sauce: "糖3,醋3,酱1,淀粉", prep: "浆腌15min,调好灵魂碗汁", step: "1.滑肉盛爆椒合肉泼汁\n2.转圈翻45s挂亮芡" },
        { name: "水煮肉片", isKid: false, ing: "里脊250,菜150,蒜泥", sauce: "豆瓣1,辣粉,滚油30ml", prep: "浆腌20min,菜烫熟垫底", step: "1.滑肉1.5min变色码蒜\n2.泼冒白烟滚油" },
        { name: "红烧肉", isKid: false, ing: "三层肉500,冰糖12,黄酒", sauce: "老抽15,生抽35,热水", prep: "3cm方煸油盛出糖色", step: "1.回肉挂色炖55min\n2.猛火收干发亮" },
        { name: "土豆泥肉末", isKid: true, ing: "土豆300,肉末100,蚝油", sauce: "生抽,老抽少,黑椒1g", prep: "蒸泥18min,肉腌5min", step: "1.炒末4.5min调汁焖2min\n2.勾浓芡淋在泥顶" },
        { name: "肉末茄子", isKid: true, ing: "紫茄2,肉末60,蚝油", sauce: "生抽1,糖5g,生粉", prep: "蒸茄10.5min至极软", step: "1.炒末入茄合炒焖2.5min\n2.收汁撒葱出锅" },
        { name: "菠萝咕噜肉", isKid: true, ing: "里脊200,菠萝80,蛋清", sauce: "茄酱60,醋1,糖2", prep: "挂粉炸2次,菠萝泡盐水", step: "1.中火汁起泡入肉翻8s\n2.全挂浆保持脆感" },
        { name: "蒜蓉西兰花", isKid: true, ing: "菜350,大蒜5,枸杞", sauce: "盐2.5,鸡精,粉水", prep: "焯2.5min,蒜压泥", step: "1.炒蒜25s入菜炒60s\n2.淋薄芡合匀装盘" },
        { name: "干炒牛河", isKid: false, ing: "牛里脊,河粉,芽菜", sauce: "生抽2,老抽半,盐1.5g", prep: "腌20min,热锅冒大烟", step: "1.滑牛变色即捞炒粉菜\n2.最大火颠炒入牛炒匀" },
        { name: "脆皮豆腐", isKid: true, ing: "老豆腐1,蛋1,粉", sauce: "茄酱2,砂糖10g", prep: "裹粉蛋煎金黄", step: "1.汁煮浓下豆腐滚10s\n2.外酥内嫩酸甜" },
        { name: "剁椒蒸翅", isKid: false, ing: "翅8,剁椒2勺,蒜末", sauce: "料酒1,生抽,葱花", prep: "背切腌10min铺厚椒", step: "1.大火蒸15.5min\n2.倒水撒葱泼热油" },
        { name: "清蒸鱼头", isKid: true, ing: "鱼头1,姜葱,豉油3", sauce: "豉油,热油,胡椒", prep: "劈开腌15min铺姜葱", step: "1.蒸12min泼200度油" },
        { name: "葱爆牛肉", isKid: false, ing: "脊200g,葱2,姜", sauce: "蚝1,酱1.5,糖2", prep: "浆腌15min,葱切滚刀", step: "1.猛火滑35s出炒葱\n2.回牛炒25s即成" },
        { name: "酱爆鸡丁", isKid: true, ing: "鸡丁200,土豆,面酱", sauce: "白糖15g,生粉少", prep: "浆腌,土豆炸熟透", step: "1.炒香面酱入鸡丁土豆\n2.大火合匀挂全酱" }
    ];

    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
    const recipes = shuffle(recipesRaw), count = recipes.length, arc = (Math.PI * 2) / count;

    function draw() {
        ctx.save(); ctx.translate(400, 400); ctx.rotate(-Math.PI / 2); ctx.translate(-400, -400);
        for (let i = 0; i < count; i++) {
            const angle = i * arc;
            ctx.beginPath();
            ctx.fillStyle = (i % 2 === 0) ? "rgba(255, 215, 0, 0.3)" : "rgba(255, 250, 205, 0.3)"; 
            ctx.moveTo(400, 400); ctx.arc(400, 400, 390, angle, angle + arc); ctx.fill();
            ctx.save(); ctx.translate(400, 400); ctx.rotate(angle + arc / 2);
            ctx.fillStyle = recipes[i].isKid ? "#28a745" : "#332200"; 
            ctx.font = "bold 19px Arial";
            ctx.textAlign = "right"; ctx.fillText(recipes[i].name, 375, 6); ctx.restore();
        }
        ctx.restore();
    }

    function startSpin() {
        if (isSpinning) return;
        isSpinning = true;
        const totalSpin = 3600 + Math.floor(Math.random() * 360);
        currentDeg += totalSpin;
        document.getElementById('wheel').style.transform = `rotate(${currentDeg}deg)`;
        
        setTimeout(() => {
            isSpinning = false;
            const normalizedDeg = (currentDeg % 360);
            const index = Math.floor((360 - normalizedDeg) / (360 / count)) % count;
            lastWinnerIdx = index;
            showRecipe(index, true);
        }, 4100);
    }

    function showRecipe(idx, isNew) {
        const r = recipes[idx];
        document.getElementById('rTitle').innerHTML = r.name + (r.isKid ? '<span class="kid-tag">萌娃餐</span>' : '');
        document.getElementById('rIng').innerText = r.ing; 
        document.getElementById('rSauce').innerText = r.sauce;
        document.getElementById('rPrep').innerText = r.prep; 
        document.getElementById('rStep').innerText = r.step;
        document.getElementById('swapBtn').style.display = isNew ? "block" : "none";
        document.getElementById('recipeCard').style.display = 'block'; 
        document.getElementById('overlay').style.display = 'block';
    }

    function confirmRecipe() {
        // 瞬间触发入口按钮，不等待动画
        document.getElementById('historyBtn').style.display = "inline-block";
        createStars();
        setTimeout(() => {
            document.getElementById('recipeCard').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }, 800);
    }

    function reviewLast() { if (lastWinnerIdx !== -1) showRecipe(lastWinnerIdx, false); }
    function swapRecipe() { document.getElementById('recipeCard').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; setTimeout(() => startSpin(), 50); }

    function createStars() {
        const container = document.getElementById('star-container');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div'); star.className = 'star'; star.innerText = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 3 + 4) + 's';
            star.style.fontSize = (Math.random() * 15 + 12) + 'px';
            container.appendChild(star);
            setTimeout(() => star.remove(), 7000);
        }
    }
    draw();
</script>
</body>
</html>
