<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幸运专属私人食谱库</title>
    <style>
        :root { --gold: #FFD700; --red: #FF4500; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; background: #fff;
            font-family: 'PingFang SC', 'STHeiti', sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* 背景：100%全亮，铺满全屏 */
        #dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg1.jpg') no-repeat center 15%; /* 偏上对齐，保护人脸 */
            background-size: cover; z-index: -1; opacity: 1;
        }

        h1 { 
            margin: 20px 0 10px; font-size: 1.5rem; color: var(--gold);
            text-shadow: 2px 2px 3px rgba(0,0,0,0.8); z-index: 10;
        }

        /* 转盘区 */
        .wheel-container {
            position: relative; width: 320px; height: 320px;
            border: 4px solid var(--gold); border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.4); z-index: 10;
            background: rgba(255,255,255,0.85);
        }
        #wheel { width: 100%; height: 100%; border-radius: 50%; transition: transform 4s cubic-bezier(0.15, 0, 0.1, 1); }
        .pointer { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 30px solid var(--red); z-index: 20; }
        .center-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 46px; height: 46px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; border: 2.5px solid #fff; z-index: 21; font-size: 12px; }

        /* 按钮区 */
        .controls { display: flex; flex-direction: column; align-items: center; margin-top: 20px; gap: 10px; z-index: 30; width: 100%; }
        .spin-btn { padding: 12px 60px; background: linear-gradient(135deg, var(--gold), #ffb800); color: #000; border: none; border-radius: 25px; font-size: 1.1rem; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .history-btn { display: none; padding: 10px 40px; background: rgba(255,255,255,0.9); color: #856404; border: 2px solid var(--gold); border-radius: 20px; font-size: 0.9rem; font-weight: bold; }

        /* 极尽详细的食谱卡片 */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 99; }
        .recipe-card {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 92%; max-width: 450px; background: #fff; color: #333;
            padding: 15px; border-radius: 12px; z-index: 100; max-height: 85vh; overflow-y: auto;
        }
        .recipe-card h2 { color: #856404; border-bottom: 2px solid var(--gold); padding-bottom: 5px; margin: 0 0 10px 0; font-size: 1.2rem; text-align: center; }
        .recipe-section { margin-bottom: 10px; background: #fffaf0; padding: 8px; border-radius: 6px; }
        .section-label { font-weight: bold; color: #d44; font-size: 0.85rem; border-bottom: 1px dashed #ccc; display: block; margin-bottom: 4px; }
        .recipe-text { font-size: 0.85rem; line-height: 1.5; color: #444; white-space: pre-line; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .swap-btn { background: #f0f0f0; color: #666; border: none; flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; }
        .confirm-btn { background: linear-gradient(135deg, var(--gold), #ffa500); color: #000; border: none; flex: 1.4; padding: 12px; border-radius: 8px; font-weight: bold; }

        .footer { margin-top: auto; padding: 25px 0; font-size: 0.7rem; color: #000; font-weight: bold; text-align: center; width: 100%; text-shadow: 0 0 5px #fff; }
        .star { position: fixed; top: -5vh; pointer-events: none; color: var(--gold); z-index: 200; animation: slowFall linear forwards; }
        @keyframes slowFall { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(105vh) rotate(360deg); opacity: 0; } }
        .kid-tag { color: #28a745; font-weight: bold; font-size: 0.7rem; border: 1px solid #28a745; padding: 0 4px; border-radius: 3px; margin-left: 5px; }
    </style>
</head>
<body>

<div id="dynamic-bg"></div>
<div id="star-container"></div>
<div class="overlay" id="overlay"></div>

<div class="recipe-card" id="recipeCard">
    <h2 id="rTitle">菜名</h2>
    <div class="recipe-section"><span class="section-label">🛒 食材清单</span><div class="recipe-text" id="rIng"></div></div>
    <div class="recipe-section"><span class="section-label">🧂 调料精确配比</span><div class="recipe-text" id="rSauce"></div></div>
    <div class="recipe-section"><span class="section-label">🔪 备菜细节</span><div class="recipe-text" id="rPrep"></div></div>
    <div class="recipe-section"><span class="section-label">🔥 烹饪计时步骤</span><div class="recipe-text" id="rStep"></div></div>
    <div class="btn-group">
        <button class="swap-btn" id="swapBtn" onclick="swapRecipe()">换一个</button>
        <button class="confirm-btn" onclick="confirmRecipe()">宝贝收到</button>
    </div>
</div>

    <button class="history-btn" id="historyBtn" onclick="reviewLast()">回顾上次奇迹</button>
</div>
<div class="footer">Made for You by 你的专属饲养员</div>

        { name: "肉末茄子", isKid: true, ing: "紫茄子2根,肉末50g", sauce: "蚝油,生抽,砂糖1平勺", prep: "茄子切条蒸10分至软身", step: "1.炒香肉末入茄子 2.合炒调味焖煮2分 3.大火收干撒葱" },
        { name: "清蒸鲈鱼", isKid: true, ing: "鲈鱼1条(500g),姜葱", sauce: "蒸鱼豉油3勺,热油30ml", prep: "鱼背划深口塞姜葱腌5分", step: "1.大火蒸8.5分闷1分 2.换鲜葱淋豉油 3.泼冒白烟热油即成" },
        { name: "菠萝咕噜肉", isKid: true, ing: "里脊肉200g,新鲜菠萝块", sauce: "番茄酱4勺,糖2勺,白醋1勺", prep: "肉切块挂厚糊炸两次酥脆", step: "1.煮浓酱汁起大泡入菠萝肉 2.极速翻10秒挂匀全浆" },
        { name: "滑蛋牛柳", isKid: true, ing: "嫩牛肉100g,鸡蛋3个", sauce: "盐2g,生粉,食用油", prep: "牛肉逆纹切丝油浆腌20分", step: "1.滑熟牛肉出锅 2.倒蛋液微凝入牛 3.推匀30秒呈果冻状关火" }
    ];

    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
    const recipes = shuffle(recipesRaw), count = recipes.length, arc = (Math.PI * 2) / count;

    function draw() {
        ctx.save(); ctx.translate(400, 400); ctx.rotate(-Math.PI / 2); ctx.translate(-400, -400);
        for (let i = 0; i < count; i++) {
            const angle = i * arc;
            ctx.beginPath(); ctx.fillStyle = (i % 2 === 0) ? "#FFD700" : "#FFFACD"; 
            ctx.moveTo(400, 400); ctx.arc(400, 400, 390, angle, angle + arc); ctx.fill();
            ctx.save(); ctx.translate(400, 400); ctx.rotate(angle + arc / 2);
            ctx.fillStyle = recipes[i].isKid ? "#28a745" : "#443300"; ctx.font = "bold 18px Arial";
            ctx.textAlign = "right"; ctx.fillText(recipes[i].name, 375, 6); ctx.restore();
        }
        ctx.restore();
    }

    function changeBg() {
        currentBgIdx = (currentBgIdx + 1) % backgroundList.length;
        document.getElementById('dynamic-bg').style.backgroundImage = `url('${backgroundList[currentBgIdx]}')`;
    }

    function startSpin() {
        if (isSpinning) return;
        isSpinning = true; changeBg();
        const totalSpin = 3600 + Math.floor(Math.random() * 360);
        document.getElementById('wheel').style.transform = `rotate(${totalSpin + currentRotation}deg)`;
        currentRotation += totalSpin;
        setTimeout(() => {
            isSpinning = false;
            const index = Math.floor((360 - (currentRotation % 360)) / (360 / count)) % count;
            lastWinnerIdx = index;
            showRecipe(index, true);
        }, 4000);
    }

    function showRecipe(idx, isNew) {
        const r = recipes[idx];
        document.getElementById('rTitle').innerHTML = r.name + (r.isKid ? '<span class="kid-tag">萌娃餐</span>' : '');
        document.getElementById('rIng').innerText = r.ing; document.getElementById('rSauce').innerText = r.sauce;
        document.getElementById('rPrep').innerText = r.prep; document.getElementById('rStep').innerText = r.step;
        document.getElementById('swapBtn').style.display = isNew ? "block" : "none";
        document.getElementById('recipeCard').style.display = 'block'; document.getElementById('overlay').style.display = 'block';
    }

    function confirmRecipe() {
        // 关键逻辑：瞬发入口
        document.getElementById('historyBtn').style.display = "inline-block";
        createStars();
        setTimeout(() => {
            document.getElementById('recipeCard').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }, 800);
    }

    function reviewLast() { if (lastWinnerIdx !== -1) showRecipe(lastWinnerIdx, false); }
    function swapRecipe() { document.getElementById('recipeCard').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; setTimeout(() => startSpin(), 50); }

    function createStars() {
        const container = document.getElementById('star-container');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div'); star.className = 'star'; star.innerText = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 3 + 3) + 's';
            star.style.fontSize = (Math.random() * 15 + 10) + 'px';
            container.appendChild(star);
            setTimeout(() => star.remove(), 6000);
        }
    }
    draw();
</script>
</body>
</html>
